<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer Dashboard for NETC 280 Lab 2</title>
    <style>
        :root {
            --cincy-green: #006A4D;
            --white: #ffffff;
            --bg-gray: #f2f4f7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--cincy-green);
            color: var(--white);
            padding: 25px;
            width: 100%;
            max-width: 850px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .setup-bar {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--cincy-green);
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .setup-bar label { font-weight: bold; color: var(--cincy-green); font-size: 0.85rem; }

        input, .btn-main {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
        }

        .btn-main {
            background-color: var(--cincy-green);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 25px;
        }

        #timerGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .timer-card {
            position: relative;
            padding: 35px 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            background: rgba(255,255,255,0.25);
            border-radius: 8px;
            padding: 5px;
        }

        .x-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .card-controls button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0,0,0,0.1);
            margin: 0 4px;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CUSTOM MODAL ALERT STYLING */
        #customAlert {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            z-index: 1000;
            text-align: center;
            min-width: 300px;
            border: 3px solid var(--cincy-green);
        }

        #customAlert h2 { margin-top: 0; color: var(--cincy-green); }
        #customAlert button {
            background: var(--cincy-green);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Study Timer Dashboard for NETC 280 Lab 2</h1>
        <h2>by Juan Pablo de Legarreta</h2>
    </header>

    <div class="setup-bar">
        <input type="text" id="subjInput" placeholder="Subject Name" style="width: 180px;">
        <div>
            <label>Mins</label>
            <input type="number" id="minInput" value="0" min="0" style="width: 50px;">
        </div>
        <div>
            <label>Secs</label>
            <input type="number" id="secInput" value="10" min="0" max="59" style="width: 50px;">
        </div>
        <div>
            <label>Color</label>
            <input type="color" id="clrInput" value="#e3f2fd">
        </div>
        <button class="btn-main" onclick="addTimer()">Create Timer</button>
    </div>

    <div id="timerGrid"></div>

    <div id="customAlert">
        <h2 id="alertMsg"></h2>
        <button onclick="closeAlert()">Dismiss</button>
    </div>

    <script>
        const timerRegistry = {};
        const BELL_URL = "https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3";

        function addTimer() {
            const subject = document.getElementById('subjInput').value || 'Task';
            const m = parseInt(document.getElementById('minInput').value) || 0;
            const s = parseInt(document.getElementById('secInput').value) || 0;
            const color = document.getElementById('clrInput').value;
            const total = (m * 60) + s;
            
            if (total <= 0) {
                showAlert("Please set a duration.");
                return;
            }

            const id = Date.now(); 
            const card = document.createElement('div');
            card.className = 'timer-card';
            card.id = `card-${id}`;
            card.style.backgroundColor = color;

            const r = parseInt(color.substr(1,2),16);
            const g = parseInt(color.substr(3,2),16);
            const b = parseInt(color.substr(5,2),16);
            const yiq = ((r*299)+(g*587)+(b*114))/1000;
            card.style.color = (yiq >= 128) ? '#222' : '#fff';

            card.innerHTML = `
                <button class="x-btn" onclick="killTimer(${id})">&times;</button>
                <h3>${subject}</h3>
                <div class="timer-display" id="display-${id}">${format(total)}</div>
                <div class="card-controls">
                    <button onclick="start(${id})">Start</button>
                    <button onclick="stop(${id})">Stop</button>
                    <button onclick="reset(${id}, ${total})">Reset</button>
                </div>
            `;
            document.getElementById('timerGrid').appendChild(card);

            timerRegistry[id] = {
                rem: total,
                run: null,
                name: subject
            };
        }

        function format(t) {
            const mm = Math.floor(t / 60);
            const ss = t % 60;
            return mm.toString().padStart(2, '0') + ":" + ss.toString().padStart(2, '0');
        }

        function start(id) {
            if (timerRegistry[id].run) return; 

            timerRegistry[id].run = setInterval(() => {
                if (timerRegistry[id].rem <= 0) {
                    clearInterval(timerRegistry[id].run);
                    timerRegistry[id].run = null;

                    const audio = new Audio(BELL_URL);
                    audio.play();

                    showAlert(`Your ${timerRegistry[id].name} timer is over!`);
                    return;
                }
                timerRegistry[id].rem--;
                document.getElementById(`display-${id}`).innerText = format(timerRegistry[id].rem);
            }, 1000);
        }

        function showAlert(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('customAlert').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('customAlert').style.display = 'none';
        }

        function stop(id) {
            if (timerRegistry[id] && timerRegistry[id].run) {
                clearInterval(timerRegistry[id].run);
                timerRegistry[id].run = null;
            }
        }

        function reset(id, orig) {
            stop(id);
            timerRegistry[id].rem = orig;
            document.getElementById(`display-${id}`).innerText = format(orig);
        }

        function killTimer(id) {
            stop(id);
            const element = document.getElementById(`card-${id}`);
            if (element) element.remove();
            delete timerRegistry[id];
        }
    </script>
</body>
</html>
